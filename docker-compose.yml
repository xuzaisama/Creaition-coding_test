services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelligent-task-manager
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/task_manager.db
      CACHE_TTL_SECONDS: "60"
    volumes:
      - task_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  task_data:
